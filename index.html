<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>앵무의 하루</title>
<style>
  :root {
    --bg: #f1faf6;
    --card: #ffffff;
    --line: #dcefe6;
    --line2: #c5e3d5;
    --ink: #2a3b34;
    --ink2: #5f7a6e;
    --ink3: #9bb3a8;
    --accent: #34c08a;
    --accent-bg: #d8f0e6;
    --accent-ink: #1f7a59;
    --warn: #c08a2a;
    --warn-bg: #f7efdc;
    --done: #2faf7d;
    --done-bg: #d8f0e6;
    --danger: #d97a6a;
    --danger-bd: #efc4bb;
    --radius: 16px;
    --radius-sm: 11px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 460px; margin: 0 auto; padding: 0 14px env(safe-area-inset-bottom); min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; font-size: 16px; }

  /* ===== 로그인 ===== */
  #auth { display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 24px; }
  #auth .logo { text-align: center; margin-bottom: 28px; }
  #auth .logo .parrot-logo { width: 96px; height: 100px; margin-bottom: 10px; }
  #auth .logo h1 { font-size: 22px; margin: 0 0 4px; font-weight: 700; }
  #auth .logo p { font-size: 14px; color: var(--ink2); margin: 0; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: var(--ink2); margin-bottom: 6px; }
  .field input {
    width: 100%; height: 48px; padding: 0 14px; border: 1px solid var(--line2);
    border-radius: var(--radius-sm); background: var(--card); color: var(--ink); outline: none;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  .who { display: flex; gap: 8px; margin-bottom: 14px; }
  .who button {
    flex: 1; height: 46px; border: 1px solid var(--line2); border-radius: var(--radius-sm);
    background: var(--card); font-size: 15px; color: var(--ink2); font-weight: 500;
  }
  .who button.on { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-ink); }
  .btn-primary {
    width: 100%; height: 50px; border-radius: var(--radius-sm); background: var(--accent);
    color: #fff; font-size: 16px; font-weight: 600; margin-top: 4px;
  }
  .btn-primary:active { opacity: .85; }
  .btn-primary:disabled { opacity: .5; }
  .switch-mode { text-align: center; margin-top: 16px; font-size: 14px; color: var(--ink2); }
  .switch-mode a { color: var(--accent); font-weight: 600; text-decoration: none; }
  .msg { font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; color: var(--danger); }

  /* ===== 메인 ===== */
  #app { display: none; padding-top: 14px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .topbar .date { font-size: 13px; color: var(--ink2); }
  .presence { display: flex; align-items: center; gap: 7px; }
  .presence .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink3); }
  .presence .dot.live { background: var(--done); }
  .presence .who-txt { font-size: 12px; color: var(--ink2); }
  .presence .me {
    width: 28px; height: 28px; border-radius: 50%; background: var(--accent-bg); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;
  }
  h2.title { font-size: 21px; margin: 2px 0 14px; font-weight: 700; }

  .days { display: flex; gap: 5px; margin-bottom: 14px; }
  .days button {
    flex: 1; height: 40px; border-radius: 10px; font-size: 14px; color: var(--ink3);
    border: 1px solid transparent; background: transparent;
  }
  .days button.on { background: var(--accent-bg); color: var(--accent-ink); font-weight: 700; }
  .days button.today::after {
    content: ''; display: block; width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); margin: 2px auto 0;
  }

  .progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
  .progress-row .lbl { font-size: 13px; color: var(--ink2); }
  .progress-row .val { font-size: 14px; font-weight: 600; }
  .bar { height: 8px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 18px; }
  .bar > div { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; transition: width .35s ease; }

  .list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .task {
    display: flex; align-items: center; gap: 12px; padding: 13px 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  }
  .task.running { border-color: var(--warn); }
  .task.done { background: #f1efe9; border-color: transparent; opacity: .72; }
  .task .ic { width: 24px; height: 24px; flex-shrink: 0; }
  .task .ic svg { width: 24px; height: 24px; display: block; }
  .task .body { flex: 1; min-width: 0; }
  .task .name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .task.done .name { text-decoration: line-through; color: var(--ink3); }
  .task .sub { font-size: 12px; margin-top: 2px; color: var(--ink3); }
  .task.running .sub { color: var(--warn); }
  .badge { font-size: 10px; padding: 1px 7px; border-radius: 99px; background: var(--accent-bg); color: var(--accent-ink); font-weight: 600; }
  .badge.status { padding: 3px 9px; font-size: 11px; }
  .badge.status.done { background: var(--done-bg); color: var(--done); }
  .act {
    min-width: 62px; height: 34px; border-radius: 9px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--line2); background: var(--card); color: var(--ink2);
  }
  .act.start { color: var(--accent-ink); border-color: #bcd6c8; background: var(--accent-bg); }
  .act.stop { color: var(--danger); border-color: var(--danger-bd); background: #fbf0ee; }
  .act:active { transform: scale(.96); }
  .del { width: 30px; height: 30px; flex-shrink: 0; color: var(--ink3); display: flex; align-items: center; justify-content: center; }
  .del svg { width: 17px; height: 17px; }
  .edit { width: 30px; height: 30px; flex-shrink: 0; color: var(--ink3); display: flex; align-items: center; justify-content: center; }
  .edit svg { width: 16px; height: 16px; }
  .act.undo { min-width: 72px; color: var(--ink2); border-color: var(--line2); background: var(--card); }

  .empty { text-align: center; color: var(--ink3); font-size: 14px; padding: 30px 0; }

  .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .add-row input { flex: 1; height: 46px; padding: 0 14px; border: 1px solid var(--line2); border-radius: var(--radius-sm); background: var(--card); outline: none; }
  .add-row input:focus { border-color: var(--accent); }
  .add-row button { width: 46px; height: 46px; border-radius: var(--radius-sm); background: var(--accent); color: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .add-row button svg { width: 20px; height: 20px; }

  .tools { display: flex; gap: 8px; margin-bottom: 20px; }
  .tools button { flex: 1; height: 42px; border-radius: var(--radius-sm); border: 1px solid var(--line2); background: var(--card); font-size: 13px; color: var(--ink2); font-weight: 500; }

  .footer { text-align: center; padding: 8px 0 24px; }
  .footer button { font-size: 13px; color: var(--ink3); text-decoration: underline; }

  /* ===== 모달 (주간 일과 추가) ===== */
  .overlay {
    position: fixed; inset: 0; background: rgba(40,38,33,.45);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
  }
  .overlay.show { display: flex; }
  .sheet {
    width: 100%; max-width: 460px; background: var(--bg); border-radius: 22px 22px 0 0;
    padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); animation: rise .25s ease;
  }
  @keyframes rise { from { transform: translateY(40px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
  .sheet h3 { font-size: 18px; margin: 0 0 2px; font-weight: 700; }
  .sheet .hint { font-size: 12px; color: var(--ink2); margin: 0 0 16px; }
  .dow { display: flex; gap: 5px; margin: 8px 0 8px; }
  .dow button { flex: 1; height: 42px; border-radius: 10px; border: 1px solid var(--line2); background: var(--card); font-size: 14px; color: var(--ink3); }
  .dow button.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .quick { display: flex; gap: 6px; margin-bottom: 16px; }
  .quick button { flex: 1; height: 32px; border-radius: 8px; border: 1px solid var(--line2); background: var(--card); font-size: 12px; color: var(--ink2); }
  .sheet-actions { display: flex; gap: 8px; margin-top: 6px; }
  .sheet-actions button { height: 48px; border-radius: var(--radius-sm); font-weight: 600; font-size: 15px; }
  .sheet-actions .cancel { flex: 1; background: var(--card); border: 1px solid var(--line2); color: var(--ink2); }
  .sheet-actions .confirm { flex: 2; background: var(--accent); color: #fff; }

  .loading { text-align: center; padding: 60px 0; color: var(--ink3); }

  /* ===== 완료 축하 효과 ===== */
  .celebrate {
    position: fixed; inset: 0; z-index: 80; display: none;
    align-items: center; justify-content: center; pointer-events: none;
  }
  .celebrate.show { display: flex; }
  .celebrate .pop {
    text-align: center;
    animation: pop-in .5s cubic-bezier(.18,.9,.3,1.3);
  }
  .celebrate .pop svg { width: 150px; height: 158px; }
  .celebrate .pop .word {
    margin-top: 6px; font-size: 19px; font-weight: 700; color: var(--accent-ink);
    background: var(--card); display: inline-block; padding: 7px 20px; border-radius: 99px;
    border: 1px solid var(--line2);
  }
  @keyframes pop-in {
    0% { transform: scale(.3) translateY(20px); opacity: 0; }
    60% { transform: scale(1.08) translateY(0); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  .celebrate.show .pop svg { animation: bob 1.1s ease-in-out infinite .5s; }
  .confetti { position: absolute; width: 9px; height: 9px; border-radius: 2px; opacity: 0; }
  .celebrate.show .confetti { animation: fall 1.3s ease-out forwards; }
  @keyframes fall {
    0% { opacity: 1; transform: translateY(-30px) rotate(0); }
    100% { opacity: 0; transform: translateY(220px) rotate(320deg); }
  }

  /* ===== 통계 화면 ===== */
  .tools button.stats-btn { color: var(--accent-ink); border-color: #bcd6c8; background: var(--accent-bg); }
  #stats { display: none; padding-top: 14px; }
  .stats-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .stats-head button.back { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line2); background: var(--card); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stats-head button.back svg { width: 18px; height: 18px; }
  .stats-head .t { font-size: 20px; font-weight: 700; }
  .stats-head .s { font-size: 13px; color: var(--ink2); }
  .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 22px; }
  .period-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .period-tabs button {
    flex: 1; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--line2);
    background: var(--card); font-size: 13px; color: var(--ink2); font-weight: 500;
  }
  .period-tabs button.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .stat-cards .c { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 14px 8px; text-align: center; }
  .stat-cards .c .v { font-size: 22px; font-weight: 700; color: var(--accent-ink); }
  .stat-cards .c .l { font-size: 11px; color: var(--ink2); margin-top: 3px; }
  .stat-block { margin-bottom: 24px; }
  .stat-block .title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .bars { display: flex; align-items: flex-end; gap: 7px; height: 130px; }
  .bars .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
  .bars .col .track { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bars .col .fill { width: 100%; background: var(--accent); border-radius: 5px 5px 0 0; min-height: 3px; transition: height .4s; }
  .bars .col .fill.low { background: #e0b15a; }
  .bars .col .fill.empty { background: var(--line); }
  .bars .col .lbl { font-size: 11px; color: var(--ink3); }
  .bars .col .lbl.today { color: var(--accent-ink); font-weight: 700; }
  .task-rates { display: flex; flex-direction: column; gap: 11px; }
  .task-rates .row .top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .task-rates .row .top .pct { font-weight: 600; color: var(--accent-ink); }
  .task-rates .row .top .pct.low { color: var(--warn); }
  .task-rates .row .bar2 { height: 7px; background: var(--line); border-radius: 99px; overflow: hidden; }
  .task-rates .row .bar2 > div { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s; }
  .task-rates .row .bar2 > div.low { background: #e0b15a; }
  .stat-note { font-size: 12px; color: var(--ink3); margin-top: 14px; text-align: center; }
  .stat-empty { text-align: center; color: var(--ink3); font-size: 14px; padding: 30px 0; }
  .day-logs { display: flex; flex-direction: column; gap: 16px; }
  .day-logs .day .dhead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .day-logs .day .dhead .dt { font-size: 14px; font-weight: 600; }
  .day-logs .day .dhead .dsum { font-size: 12px; color: var(--ink2); }
  .day-logs .day .it { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 9px 12px; background: var(--card); border: 1px solid var(--line); border-radius: 11px; margin-bottom: 6px; }
  .day-logs .day .it .nm { font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .day-logs .day .it .tm { font-size: 12px; color: var(--accent-ink); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .day-logs .day .it.undone .tm { color: var(--ink3); font-weight: 400; }

  /* ===== 동기부여 (딸·엄마 공통) ===== */
  .motivate { display: flex; gap: 10px; margin-bottom: 16px; }
  .motivate .streak {
    flex: 1; background: var(--card); border: 1px solid var(--line2); border-radius: 14px;
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  }
  .motivate .streak svg { width: 38px; height: 38px; flex-shrink: 0; }
  .motivate .streak .num { font-size: 22px; font-weight: 700; color: var(--accent-ink); line-height: 1; }
  .motivate .streak .cap { font-size: 12px; color: var(--ink2); margin-top: 2px; }
  .motivate .stamps {
    flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px;
  }
  .motivate .stamps .h { font-size: 12px; color: var(--ink2); margin-bottom: 8px; }
  .motivate .stamps .row { display: flex; gap: 4px; }
  .motivate .stamps .dot {
    flex: 1; aspect-ratio: 1; border-radius: 50%; background: #f1f0e9; border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
  }
  .motivate .stamps .dot.done { background: var(--accent-bg); border-color: var(--accent); padding: 2px; }
  .motivate .stamps .dot.done svg { width: 100%; height: 100%; }
  .motivate .stamps .dot.today { background: var(--accent-bg); border: 2px solid var(--accent); }
  .motivate .stamps .labels { display: flex; gap: 4px; margin-top: 3px; }
  .motivate .stamps .labels span { flex: 1; text-align: center; font-size: 9px; color: var(--ink3); }
  .motivate .stamps .labels span.today { color: var(--accent-ink); font-weight: 700; }
  .celebrate .pop.big svg { width: 190px; height: 200px; }
  .celebrate .pop.big .word { font-size: 21px; }

  /* ===== 담당자 배지 (엄마 관리 화면) ===== */
  .badge.owner { background: var(--accent-bg); color: var(--accent-ink); }
  .badge.owner.mom { background: #ece3f7; color: #6b4fa0; }

  /* ===== 대시보드로 가기 버튼 (관리 화면) ===== */
  .topbar .back { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line2); background: var(--card); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .topbar .back svg { width: 17px; height: 17px; color: var(--ink2); }

  /* ===== 엄마 대시보드 ===== */
  #dash { display: none; padding-top: 14px; }
  .dash-hero { display: flex; align-items: center; gap: 18px; margin: 6px 0 20px; }
  .dash-hero .ring { width: 104px; height: 104px; flex-shrink: 0; }
  #dashRing { transition: stroke-dashoffset .5s ease; }
  .dash-hero .big { font-size: 22px; font-weight: 700; color: var(--accent-ink); }
  .dash-hero .cap { font-size: 13px; color: var(--ink2); margin-top: 3px; }
  .dash-block-title { font-size: 13px; color: var(--ink2); margin: 16px 0 8px; }
  .dash-list { display: flex; flex-direction: column; }
  .dash-row { display: flex; align-items: center; gap: 10px; padding: 11px 2px; border-top: 1px solid var(--line); }
  .dash-row:first-child { border-top: none; }
  .dash-row .di { width: 22px; height: 22px; flex-shrink: 0; }
  .dash-row .di svg { width: 22px; height: 22px; display: block; }
  .dash-row .dn { flex: 1; font-size: 14px; min-width: 0; }
  .dash-row .t-done { font-size: 12px; color: var(--done); font-weight: 600; white-space: nowrap; }
  .dash-row .t-run { font-size: 12px; color: var(--warn); font-weight: 600; white-space: nowrap; }
  .dash-row .t-wait { font-size: 12px; color: var(--ink3); white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 로그인 화면 -->
  <div id="auth">
    <div class="logo">
      <svg class="parrot-logo" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg" aria-label="앵무새 마스코트">
        <defs>
          <linearGradient id="lbody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8ccb66"/><stop offset="45%" stop-color="#90d18a"/><stop offset="100%" stop-color="#86ddc6"/>
          </linearGradient>
          <radialGradient id="lbelly" cx="50%" cy="38%" r="62%">
            <stop offset="0%" stop-color="#fdfcf6"/><stop offset="62%" stop-color="#fbfaf2"/><stop offset="100%" stop-color="#fbfaf2" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="lface" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9ad26d"/><stop offset="45%" stop-color="#cbe49a"/><stop offset="100%" stop-color="#f2e6a4"/>
          </linearGradient>
          <radialGradient id="lcheek" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f7b2a2"/><stop offset="100%" stop-color="#f7b2a2" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <path d="M100 18 C40 18 21 81 27 133 C31 175 63 197 100 197 C137 197 169 175 173 133 C179 81 160 18 100 18 Z" fill="url(#lbody)"/>
        <ellipse cx="100" cy="111" rx="59" ry="71" fill="url(#lbelly)"/>
        <path d="M100 18 C51 18 28 62 35 103 C56 119 80 124 100 124 C120 124 144 119 165 103 C172 62 149 18 100 18 Z" fill="url(#lface)"/>
        <ellipse cx="67" cy="98" rx="18" ry="15" fill="url(#lcheek)"/>
        <ellipse cx="133" cy="98" rx="18" ry="15" fill="url(#lcheek)"/>
        <circle cx="71" cy="83" r="11" fill="#2a2a28"/><circle cx="74.5" cy="79" r="3.6" fill="#fff"/>
        <circle cx="129" cy="83" r="11" fill="#2a2a28"/><circle cx="132.5" cy="79" r="3.6" fill="#fff"/>
        <path d="M100 100 C89 100 87 110 95.5 115.5 L100 118.5 L104.5 115.5 C113 110 111 100 100 100 Z" fill="#f6bcc4"/>
        <path d="M95.5 115.5 L100 122 L104.5 115.5 Z" fill="#e89aa6"/>
        <path d="M55 116 C37 118 35 139 49 145 C41 130 49 121 55 116 Z" fill="#74bd54" opacity="0.9"/>
        <path d="M145 116 C163 118 165 139 151 145 C159 130 151 121 145 116 Z" fill="#74bd54" opacity="0.9"/>
      </svg>
      <h1>앵무의 하루</h1>
      <p>오늘 할 일을 시작하고 끝내요</p>
    </div>

    <div class="who" id="whoPick">
      <button data-who="daughter" class="on">딸</button>
      <button data-who="mom">엄마</button>
    </div>
    <div class="field">
      <label>이메일</label>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://xjlhtdggkizjlmvsuiid.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c8vgo6BFI9Gn6P1mkAgsMQ_-B-dcquU';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const DOW = ['월','화','수','목','금','토','일'];
const todayIdx = (new Date().getDay() + 6) % 7;
let selectedDay = todayIdx;
let myRole = 'daughter';
let signupMode = false;

const $ = (id) => document.getElementById(id);
const todayDateStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
// 이번 주에서 현재 선택한 요일의 실제 날짜 (일회성 '오늘 할 일' 판단용)
const dateOfSelectedDay = () => {
  const d = new Date();
  d.setDate(d.getDate() + (selectedDay - todayIdx));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const fmtTime = (ts) => {
  if (!ts) return '';
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const minutesBetween = (a, b) => Math.max(1, Math.round((new Date(b) - new Date(a)) / 60000));

/* ========== 로그인 ========== */
$('whoPick').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  myRole = b.dataset.who;
  [...$('whoPick').children].forEach(x => x.classList.toggle('on', x === b));
});
function onToggleMode(e) {
  e.preventDefault();
  signupMode = !signupMode;
  $('authBtn').textContent = signupMode ? '가입하기' : '로그인';
  $('switchMode').innerHTML = signupMode
    ? '이미 계정이 있나요? <a href="#" id="toSignup">로그인</a>'
    : '처음이신가요? <a href="#" id="toSignup">가입하기</a>';
  $('toSignup').addEventListener('click', onToggleMode);
  $('authMsg').textContent = '';
}
$('toSignup').addEventListener('click', onToggleMode);

$('authBtn').addEventListener('click', async () => {
  const email = $('email').value.trim();
  const password = $('password').value;
  const msg = $('authMsg');
  if (!email || !password) { msg.textContent = '이메일과 비밀번호를 입력해 주세요.'; return; }
  $('authBtn').disabled = true;
  msg.style.color = 'var(--ink2)'; msg.textContent = '잠시만요...';
  try {
    if (signupMode) {
      const { error } = await sb.auth.signUp({ email, password, options: { data: { role: myRole } } });
      if (error) throw error;
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }
  } catch (err) {
    msg.style.color = 'var(--danger)';
    msg.textContent = translateError(err.message);
    $('authBtn').disabled = false;
  }
});

function translateError(m) {
  if (/Invalid login/i.test(m)) return '이메일 또는 비밀번호가 맞지 않아요.';
  if (/already registered/i.test(m)) return '이미 가입된 이메일이에요. 로그인해 주세요.';
  if (/at least 6/i.test(m)) return '비밀번호는 6자 이상이어야 해요.';
  if (/valid email/i.test(m)) return '이메일 형식을 확인해 주세요.';
  return m;
}

$('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

/* ========== 세션 전환 ========== */
sb.auth.onAuthStateChange((_event, session) => {
  if (session) showApp(session);
  else { $('auth').style.display = 'flex'; $('app').style.display = 'none'; $('dash').style.display = 'none'; $('stats').style.display = 'none'; }
});

let currentUser = null;
async function showApp(session) {
  currentUser = session.user;
  myRole = currentUser.user_metadata?.role || 'daughter';
  $('auth').style.display = 'none';
  $('meAvatar').textContent = myRole === 'mom' ? '엄마' : '딸';
  $('openStats').style.display = myRole === 'mom' ? 'block' : 'none';
  $('appBack').style.display = myRole === 'mom' ? 'flex' : 'none';
  $('appTitle').textContent = myRole === 'mom' ? '일과 관리' : '오늘의 일과';
  renderDays();
  renderTodayLabel();
  if (myRole === 'mom') {
    // 엄마: 시각적 대시보드를 첫 화면으로
    $('app').style.display = 'none';
    $('dash').style.display = 'block';
    $('dashDate').textContent = $('todayLabel').textContent;
    await loadDashboard();
    await loadAndRender();      // 관리 화면 미리 준비 (숨김 상태)
  } else {
    // 딸: 단순한 '내 일과' 화면
    $('dash').style.display = 'none';
    $('app').style.display = 'block';
    await loadAndRender();
  }
  subscribeRealtime();
  setupPresence();
}

function renderTodayLabel() {
  const d = new Date();
  $('todayLabel').textContent = `${d.getMonth()+1}월 ${d.getDate()}일 ${DOW[todayIdx]}요일`;
}

/* ========== 요일 탭 ========== */
function renderDays() {
  const c = $('days'); c.innerHTML = '';
  DOW.forEach((d, i) => {
    const b = document.createElement('button');
    b.textContent = d;
    if (i === selectedDay) b.classList.add('on');
    if (i === todayIdx) b.classList.add('today');
    b.onclick = () => { selectedDay = i; renderDays(); loadAndRender(); };
    c.appendChild(b);
  });
}

/* ========== 데이터 로드 ========== */
let tasksCache = [];
let logsCache = {};

async function loadAndRender() {
  const dateStr = dateOfSelectedDay();
  let q = sb.from('tasks').select('*').eq('day_of_week', selectedDay)
    .or(`task_date.is.null,task_date.eq.${dateStr}`);
  if (myRole === 'daughter') q = q.eq('owner', 'daughter');   // 딸은 자기 일과만
  const { data: tasks, error: te } = await q.order('sort_order').order('created_at');
  if (te) { $('list').innerHTML = `<div class="empty">불러오기 오류: ${te.message}</div>`; return; }
  tasksCache = tasks || [];

  const ids = tasksCache.map(t => t.id);
  logsCache = {};
  if (ids.length && selectedDay === todayIdx) {
    const { data: logs } = await sb.from('task_logs')
      .select('*').in('task_id', ids).eq('log_date', todayDateStr());
    (logs || []).forEach(l => { logsCache[l.task_id] = l; });
  }
  renderList();
  loadMotivation();
}

/* ========== 목록 렌더 ========== */
function renderList() {
  const list = $('list');
  if (!tasksCache.length) {
    list.innerHTML = `<div class="empty">${DOW[selectedDay]}요일 일과가 아직 없어요.<br>아래에서 추가해 보세요.</div>`;
    updateProgress(); return;
  }
  const isToday = selectedDay === todayIdx;
  list.innerHTML = '';
  tasksCache.forEach(task => {
    const log = logsCache[task.id];
    const status = isToday && log ? log.status : 0;
    const el = document.createElement('div');
    el.className = 'task' + (status === 1 ? ' running' : status === 2 ? ' done' : '');

    let icon, sub, actHtml;
    if (status === 2) {
      icon = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--done)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      sub = `${fmtTime(log.started_at)} ~ ${fmtTime(log.ended_at)} · ${minutesBetween(log.started_at, log.ended_at)}분 걸림`;
      actHtml = `<button class="act undo" data-act="undo" data-id="${task.id}">되돌리기</button>`;
    } else if (status === 1) {
      icon = `<svg viewBox="0 0 24 24" fill="var(--warn)" stroke="none"><circle cx="12" cy="12" r="10" opacity=".15"/><path d="M10 8l6 4-6 4z"/></svg>`;
      const mins = minutesBetween(log.started_at, new Date().toISOString());
      sub = `${fmtTime(log.started_at)} 시작 · 진행 중 (${mins}분째)`;
      actHtml = `<button class="act stop" data-act="stop" data-id="${task.id}">종료</button>`;
    } else {
      icon = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.6"><circle cx="12" cy="12" r="9.2"/></svg>`;
      sub = isToday ? '아직 시작 안 함' : '';
      actHtml = isToday ? `<button class="act start" data-act="start" data-id="${task.id}">시작</button>` : '';
    }

    const ownerBadge = (myRole === 'mom')
      ? `<span class="badge owner ${task.owner === 'mom' ? 'mom' : ''}">${task.owner === 'mom' ? '엄마' : '딸'}</span>`
      : '';
    const adhocBadge = task.task_date ? '<span class="badge">오늘만</span>' : '';

    el.innerHTML = `
      <div class="ic">${icon}</div>
      <div class="body">
        <div class="name">${escapeHtml(task.title)} ${ownerBadge}${adhocBadge}</div>
        ${sub ? `<div class="sub">${sub}</div>` : ''}
      </div>
      ${actHtml}
      <button class="edit" data-edit="${task.id}" aria-label="이름 수정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
      <button class="del" data-del="${task.id}" aria-label="삭제">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      </button>`;
    list.appendChild(el);
  });
  updateProgress();
}

function updateProgress() {
  const isToday = selectedDay === todayIdx;
  const total = tasksCache.length;
  const done = isToday ? tasksCache.filter(t => logsCache[t.id]?.status === 2).length : 0;
  const pct = total ? Math.round(done / total * 100) : 0;
  $('progressVal').textContent = `${done} / ${total} 완료 · ${pct}%`;
  $('progressBar').style.width = pct + '%';
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ========== 시작 / 종료 / 삭제 ========== */
$('list').addEventListener('click', async (e) => {
  const startBtn = e.target.closest('[data-act="start"]');
  const stopBtn = e.target.closest('[data-act="stop"]');
  const undoBtn = e.target.closest('[data-act="undo"]');
  const delBtn = e.target.closest('[data-del]');
  const editBtn = e.target.closest('[data-edit]');

  if (startBtn) {
    const id = +startBtn.dataset.id;
    startBtn.disabled = true;
    await sb.from('task_logs').insert({
      task_id: id, log_date: todayDateStr(),
      started_at: new Date().toISOString(), status: 1
    });
    await loadAndRender();
  } else if (stopBtn) {
    const id = +stopBtn.dataset.id;
    stopBtn.disabled = true;
    const log = logsCache[id];
    if (log) {
      await sb.from('task_logs').update({
        ended_at: new Date().toISOString(), status: 2
      }).eq('id', log.id);
    }
    await loadAndRender();
    const allDoneNow = tasksCache.length > 0 && tasksCache.every(t => logsCache[t.id]?.status === 2);
    showCelebrate(allDoneNow);
  } else if (undoBtn) {
    // 완료 되돌리기: 기록을 지워 '아직 시작 안 함' 상태로 복귀
    const id = +undoBtn.dataset.id;
    undoBtn.disabled = true;
    const log = logsCache[id];
    if (log) await sb.from('task_logs').delete().eq('id', log.id);
    await loadAndRender();
  } else if (delBtn) {
    const id = +delBtn.dataset.del;
    if (confirm('이 일과를 삭제할까요?')) {
      await sb.from('tasks').delete().eq('id', id);
      await loadAndRender();
    }
  } else if (editBtn) {
    // 일과 이름 수정
    const id = +editBtn.dataset.edit;
    const task = tasksCache.find(t => t.id === id);
    const cur = task ? task.title : '';
    const next = prompt('할 일 이름을 수정하세요', cur);
    if (next !== null) {
      const v = next.trim();
      if (v && v !== cur) {
        await sb.from('tasks').update({ title: v }).eq('id', id);
        await loadAndRender();
      }
    }
  }
});

/* ========== 동기부여 (연속 배지·이번 주 도장) ========== */
async function loadMotivation() {
  const box = $('motivate');
  if (!currentUser || myRole === 'mom') { box.style.display = 'none'; return; }
  box.style.display = 'flex';

  const { data: allTasks } = await sb.from('tasks').select('id, day_of_week').is('task_date', null);
  const tasksByDow = [[],[],[],[],[],[],[]];
  (allTasks || []).forEach(t => { if (tasksByDow[t.day_of_week]) tasksByDow[t.day_of_week].push(t.id); });

  const since = dateNDaysAgo(40);
  const { data: logs } = await sb.from('task_logs').select('task_id, log_date, status').gte('log_date', since);
  const doneByDate = {};
  (logs || []).forEach(l => {
    if (l.status === 2) (doneByDate[l.log_date] = doneByDate[l.log_date] || new Set()).add(l.task_id);
  });

  const dayComplete = (back) => {
    const d = new Date(); d.setDate(d.getDate() - back);
    const dow = (d.getDay() + 6) % 7;
    const planned = tasksByDow[dow] || [];
    if (!planned.length) return null;
    const dateStr = dateNDaysAgo(back);
    const done = doneByDate[dateStr] || new Set();
    return planned.every(tid => done.has(tid));
  };

  let streak = 0;
  for (let back = 0; back < 60; back++) {
    const c = dayComplete(back);
    if (c === null) continue;
    if (back === 0 && !c) continue;
    if (c) streak++; else break;
  }
  $('streakNum').textContent = streak + '일';

  const todayDow = (new Date().getDay() + 6) % 7;
  const DOWK = ['월','화','수','목','금','토','일'];
  const rowEl = $('stampRow'), labEl = $('stampLabels');
  rowEl.innerHTML = ''; labEl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const back = todayDow - i;
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (back >= 0) {
      const c = dayComplete(back);
      if (c === true) dot.classList.add('done');
    }
    if (i === todayDow) dot.classList.add('today');
    if (dot.classList.contains('done')) {
      dot.innerHTML = '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
        + '<path d="M20 4 C9 4 5 16 6 25 C7 33 13 37 20 37 C27 37 33 33 34 25 C35 16 31 4 20 4Z" fill="#86d59f"/>'
        + '<path d="M20 5 C11 5 7 13 8 21 C12 25 16 26 20 26 C24 26 28 25 32 21 C33 13 29 5 20 5Z" fill="#f2e6a4"/>'
        + '<circle cx="15" cy="16" r="3" fill="#2a2a28"/><circle cx="16" cy="15" r="1" fill="#fff"/>'
        + '<circle cx="25" cy="16" r="3" fill="#2a2a28"/><circle cx="26" cy="15" r="1" fill="#fff"/>'
        + '<path d="M20 19 c-2.2 0-2.5 2-0.9 2.9 L20 22.6 l0.9-0.7 c1.6-0.9 1.3-2.9-0.9-2.9Z" fill="#f08fa0"/>'
        + '</svg>';
    }
    rowEl.appendChild(dot);
    const lab = document.createElement('span');
    lab.textContent = DOWK[i];
    if (i === todayDow) lab.className = 'today';
    labEl.appendChild(lab);
  }
}

/* ========== 엄마 대시보드 데이터 ========== */
async function loadDashboard() {
  const today = todayDateStr();
  const { data: dTasks } = await sb.from('tasks')
    .select('id, title, day_of_week, task_date, sort_order, created_at')
    .eq('owner', 'daughter');
  const all = dTasks || [];
  const daughterIds = new Set(all.map(t => t.id));
  const byDow = [[],[],[],[],[],[],[]];
  all.forEach(t => { if (t.task_date == null && byDow[t.day_of_week]) byDow[t.day_of_week].push(t.id); });
  const todayList = all
    .filter(t => t.day_of_week === todayIdx && (t.task_date == null || t.task_date === today))
    .sort((a, b) => (a.sort_order - b.sort_order) || (new Date(a.created_at || 0) - new Date(b.created_at || 0)));

  const since = dateNDaysAgo(30);
  const { data: rawLogs } = await sb.from('task_logs').select('*').gte('log_date', since);
  const logs = (rawLogs || []).filter(l => daughterIds.has(l.task_id));
  const logsByDate = {};
  logs.forEach(l => { (logsByDate[l.log_date] = logsByDate[l.log_date] || []).push(l); });
  const doneOn = (ds) => new Set((logsByDate[ds] || []).filter(l => l.status === 2).map(l => l.task_id));

  // 오늘 도넛
  const todayDone = doneOn(today);
  const totalToday = todayList.length;
  const doneCount = todayList.filter(t => todayDone.has(t.id)).length;
  const pct = totalToday ? Math.round(doneCount / totalToday * 100) : 0;
  $('dashRing').style.strokeDashoffset = String(Math.round(314 * (1 - pct / 100)));
  $('dashRingTxt').textContent = `${doneCount}/${totalToday}`;
  $('dashPct').textContent = `${pct}% 진행`;
  $('dashCaption').textContent = !totalToday ? '오늘 일과가 없어요'
    : pct === 100 ? '오늘 다 했어요!' : pct >= 50 ? '잘 따라오고 있어요' : '아직 시작이에요';

  // 연속 달성
  let streak = 0;
  for (let back = 0; back < 60; back++) {
    const d = new Date(); d.setDate(d.getDate() - back);
    const dow = (d.getDay() + 6) % 7;
    const planned = byDow[dow] || [];
    if (!planned.length) continue;
    const done = doneOn(dateNDaysAgo(back));
    const allDone = planned.every(id => done.has(id));
    if (back === 0 && !allDone) continue;
    if (allDone) streak++; else break;
  }
  $('dashStreak').textContent = streak + '일';

  // 주간 달성률 (최근 7일)
  let wp = 0, wd = 0;
  for (let back = 0; back < 7; back++) {
    const d = new Date(); d.setDate(d.getDate() - back);
    const dow = (d.getDay() + 6) % 7;
    const planned = byDow[dow] || [];
    if (!planned.length) continue;
    const done = doneOn(dateNDaysAgo(back));
    planned.forEach(id => { wp++; if (done.has(id)) wd++; });
  }
  $('dashWeekly').textContent = wp ? Math.round(wd / wp * 100) + '%' : '–';

  // 평균 완료 시각
  let mins = 0, n = 0;
  logs.forEach(l => {
    if (l.status === 2 && l.ended_at) {
      const e = new Date(l.ended_at);
      mins += e.getHours() * 60 + e.getMinutes(); n++;
    }
  });
  if (n) {
    const avg = Math.round(mins / n);
    $('dashAvgEnd').textContent = `${String(Math.floor(avg / 60)).padStart(2,'0')}:${String(avg % 60).padStart(2,'0')}`;
  } else { $('dashAvgEnd').textContent = '–'; }

  // 요일별 막대 (이번 주)
  const DOWK = ['월','화','수','목','금','토','일'];
  const barsEl = $('dashBars'); barsEl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + (i - todayIdx));
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const planned = byDow[i] || [];
    const done = doneOn(ds);
    const p = planned.length ? Math.round(planned.filter(id => done.has(id)).length / planned.length * 100) : 0;
    const cls = planned.length === 0 ? 'empty' : (p < 60 ? 'low' : '');
    const col = document.createElement('div'); col.className = 'col';
    col.innerHTML = `<div class="track"><div class="fill ${cls}" style="height:${Math.max(p, 3)}%"></div></div><div class="lbl ${i === todayIdx ? 'today' : ''}">${DOWK[i]}</div>`;
    barsEl.appendChild(col);
  }

  // 오늘 일과 요약
  const tEl = $('dashToday'); tEl.innerHTML = '';
  if (!todayList.length) {
    tEl.innerHTML = '<div class="empty">오늘 윤서 일과가 없어요.</div>';
  } else {
    const logById = {}; (logsByDate[today] || []).forEach(l => { logById[l.task_id] = l; });
    tEl.innerHTML = todayList.map(t => {
      const log = logById[t.id]; const st = log ? log.status : 0;
      let ic, info;
      if (st === 2) {
        ic = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--done)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        info = `<span class="t-done">${fmtTime(log.started_at)}~${fmtTime(log.ended_at)}</span>`;
      } else if (st === 1) {
        ic = '<svg viewBox="0 0 24 24" fill="var(--warn)" stroke="none"><circle cx="12" cy="12" r="10" opacity=".15"/><path d="M10 8l6 4-6 4z"/></svg>';
        info = '<span class="t-run">진행 중</span>';
      } else {
        ic = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.6"><circle cx="12" cy="12" r="9.2"/></svg>';
        info = '<span class="t-wait">대기</span>';
      }
      return `<div class="dash-row"><span class="di">${ic}</span><span class="dn">${escapeHtml(t.title)}</span>${info}</div>`;
    }).join('');
  }
}

function dateNDaysAgo(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function loadStats() {
  $('stWeekly').textContent = '…';
  $('stStreak').textContent = '…';
  $('stAvg').textContent = '…';
  $('stBars').innerHTML = '';
  $('stTaskRates').innerHTML = '';
  $('stNote').textContent = '';
  $('stDayLogs').innerHTML = '';

  const since = dateNDaysAgo(statsDays);

  const { data: allTasks } = await sb.from('tasks').select('id, title, day_of_week').is('task_date', null);
  const { data: logs } = await sb.from('task_logs').select('*').gte('log_date', since);
  // 날짜별 기록용: 일회성 포함 모든 일과의 제목 맵
  const { data: allTitles } = await sb.from('tasks').select('id, title');
  const titleMap = {};
  (allTitles || []).forEach(t => { titleMap[t.id] = t.title; });
  const taskMap = {};
  (allTasks || []).forEach(t => { taskMap[t.id] = t; });
  const tasksByDow = [[],[],[],[],[],[],[]];
  (allTasks || []).forEach(t => { if (tasksByDow[t.day_of_week]) tasksByDow[t.day_of_week].push(t.id); });

  const logsByDate = {};
  (logs || []).forEach(l => {
    (logsByDate[l.log_date] = logsByDate[l.log_date] || []).push(l);
  });

  let totalPlanned = 0, totalDone = 0, totalMinutes = 0, doneCount = 0;
  const dowPlanned = [0,0,0,0,0,0,0], dowDone = [0,0,0,0,0,0,0];
  const taskPlanned = {}, taskDone = {};

  for (let back = 0; back < statsDays; back++) {
    const dateStr = dateNDaysAgo(back);
    const d = new Date(); d.setDate(d.getDate() - back);
    const dow = (d.getDay() + 6) % 7;
    const planned = tasksByDow[dow] || [];
    if (!planned.length) continue;
    const dayLogs = logsByDate[dateStr] || [];
    const doneIds = new Set(dayLogs.filter(l => l.status === 2).map(l => l.task_id));
    planned.forEach(tid => {
      totalPlanned++; dowPlanned[dow]++;
      taskPlanned[tid] = (taskPlanned[tid] || 0) + 1;
      if (doneIds.has(tid)) {
        totalDone++; dowDone[dow]++;
        taskDone[tid] = (taskDone[tid] || 0) + 1;
      }
    });
    dayLogs.forEach(l => {
      if (l.status === 2 && l.started_at && l.ended_at) {
        totalMinutes += Math.max(1, Math.round((new Date(l.ended_at) - new Date(l.started_at)) / 60000));
        doneCount++;
      }
    });
  }

  $('stWeekly').textContent = totalPlanned ? Math.round(totalDone / totalPlanned * 100) + '%' : '–';
  $('stAvg').textContent = doneCount ? Math.round(totalMinutes / doneCount) + '분' : '–';

  let streak = 0;
  for (let back = 0; back < 60; back++) {
    const dateStr = dateNDaysAgo(back);
    const d = new Date(); d.setDate(d.getDate() - back);
    const dow = (d.getDay() + 6) % 7;
    const planned = tasksByDow[dow] || [];
    if (!planned.length) continue;
    const dayLogs = logsByDate[dateStr] || [];
    const doneIds = new Set(dayLogs.filter(l => l.status === 2).map(l => l.task_id));
    const allDone = planned.every(tid => doneIds.has(tid));
    if (back === 0 && !allDone) continue;
    if (allDone) streak++; else break;
  }
  $('stStreak').textContent = streak + '일';

  const DOWK = ['월','화','수','목','금','토','일'];
  const todayDow = (new Date().getDay() + 6) % 7;
  const barsEl = $('stBars');
  DOWK.forEach((name, i) => {
    const pct = dowPlanned[i] ? Math.round(dowDone[i] / dowPlanned[i] * 100) : 0;
    const col = document.createElement('div');
    col.className = 'col';
    const cls = dowPlanned[i] === 0 ? 'empty' : (pct < 60 ? 'low' : '');
    col.innerHTML = `<div class="track"><div class="fill ${cls}" style="height:${Math.max(pct, dowPlanned[i]?3:3)}%"></div></div>`
      + `<div class="lbl ${i===todayDow?'today':''}">${name}</div>`;
    barsEl.appendChild(col);
  });

  const rates = Object.keys(taskPlanned).map(tid => ({
    title: taskMap[tid] ? taskMap[tid].title : '(삭제됨)',
    pct: Math.round((taskDone[tid] || 0) / taskPlanned[tid] * 100),
    planned: taskPlanned[tid]
  })).sort((a, b) => b.pct - a.pct);

  const ratesEl = $('stTaskRates');
  if (!rates.length) {
    ratesEl.innerHTML = '<div class="stat-empty">아직 기록이 없어요.<br>며칠 사용하면 통계가 쌓여요.</div>';
  } else {
    const seen = {};
    const merged = [];
    rates.forEach(r => {
      if (seen[r.title] !== undefined) {
        const m = merged[seen[r.title]];
        m._p += r.planned; m._d += r.planned * r.pct / 100;
        m.pct = Math.round(m._d / m._p * 100);
      } else {
        seen[r.title] = merged.length;
        merged.push({ title: r.title, pct: r.pct, _p: r.planned, _d: r.planned * r.pct / 100 });
      }
    });
    merged.sort((a, b) => b.pct - a.pct);
    ratesEl.innerHTML = merged.map(r => {
      const low = r.pct < 60;
      return `<div class="row"><div class="top"><span>${escapeHtml(r.title)}</span>`
        + `<span class="pct ${low?'low':''}">${r.pct}%</span></div>`
        + `<div class="bar2"><div class="${low?'low':''}" style="width:${r.pct}%"></div></div></div>`;
    }).join('');
    const worst = merged[merged.length - 1];
    if (worst && worst.pct < 70) {
      $('stNote').textContent = `'${worst.title}'을(를) 가장 자주 건너뛰고 있어요`;
    } else {
      $('stNote').textContent = '꾸준히 잘 하고 있어요';
    }
  }

  // ===== 날짜별 기록 (언제 시작·완료했는지) =====
  const dayLogsEl = $('stDayLogs');
  const recDays = [];
  for (let back = 0; back < statsDays; back++) {
    const dateStr = dateNDaysAgo(back);
    const dayLogs = (logsByDate[dateStr] || []).slice()
      .sort((a, b) => new Date(a.started_at || 0) - new Date(b.started_at || 0));
    if (!dayLogs.length) continue;
    const d = new Date(); d.setDate(d.getDate() - back);
    const label = `${d.getMonth()+1}월 ${d.getDate()}일 (${DOWK[(d.getDay()+6)%7]})`;
    const doneN = dayLogs.filter(l => l.status === 2).length;
    const items = dayLogs.map(l => {
      const nm = escapeHtml(titleMap[l.task_id] || '(삭제된 일과)');
      if (l.status === 2 && l.started_at && l.ended_at) {
        const mins = Math.max(1, Math.round((new Date(l.ended_at) - new Date(l.started_at)) / 60000));
        return `<div class="it"><span class="nm">${nm}</span><span class="tm">${fmtTime(l.started_at)}~${fmtTime(l.ended_at)} · ${mins}분</span></div>`;
      } else if (l.status === 1 && l.started_at) {
        return `<div class="it undone"><span class="nm">${nm}</span><span class="tm">${fmtTime(l.started_at)} 시작 · 미완</span></div>`;
      }
      return `<div class="it undone"><span class="nm">${nm}</span><span class="tm">기록</span></div>`;
    }).join('');
    recDays.push(`<div class="day"><div class="dhead"><span class="dt">${label}</span><span class="dsum">완료 ${doneN}개</span></div>${items}</div>`);
  }
  dayLogsEl.innerHTML = recDays.length ? recDays.join('')
    : '<div class="stat-empty">아직 기록이 없어요.<br>일과를 시작하고 끝내면 여기에 쌓여요.</div>';
}

/* ========== 실시간 동기화 ========== */
function refreshActive() {
  loadAndRender();
  if (myRole === 'mom') loadDashboard();
}
function subscribeRealtime() {
  sb.channel('routine-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => refreshActive())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'task_logs' }, () => refreshActive())
    .subscribe();
}

/* ========== 접속 표시 (presence) ========== */
function setupPresence() {
  const ch = sb.channel('presence-room', { config: { presence: { key: currentUser.id } } });
  ch.on('presence', { event: 'sync' }, () => {
    const state = ch.presenceState();
    const others = Object.keys(state).filter(k => k !== currentUser.id);
    const dot = $('presenceDot');
    if (others.length) {
      dot.classList.add('live');
      const names = others.map(k => state[k][0]?.role === 'mom' ? '엄마' : '딸');
      $('presenceTxt').textContent = `${[...new Set(names)].join('·')} 접속 중`;
    } else {
      dot.classList.remove('live');
      $('presenceTxt').textContent = '나만 접속 중';
    }
  });
  ch.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') await ch.track({ role: myRole, at: Date.now() });
  });
}

/* 진행 중 경과시간 1분마다 갱신 */
setInterval(() => { if ($('app').style.display === 'block' && selectedDay === todayIdx) renderList(); }, 60000);
</script>
